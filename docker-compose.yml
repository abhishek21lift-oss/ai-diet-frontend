version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fitness_619_db
    environment:
      POSTGRES_DB: fitness_619
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres619
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitness_619_api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres619@db:5432/fitness_619?schema=public
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production_32chars}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh_changeme_32chars}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-619-fitness-uploads}
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitness_619_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: fitness_619_network
